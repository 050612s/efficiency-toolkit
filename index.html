<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛠️ 效率百科 - 40+免费在线工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--card:#13132b;--card2:#1a1a35;--border:#2a2a50;--primary:#6366f1;--primary2:#818cf8;--text:#e2e8f0;--muted:#64748b;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--gold:#fbbf24}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
a{color:var(--primary2);text-decoration:none}

/* HEADER */
header{background:linear-gradient(135deg,#1e1b4b,#312e81);padding:2rem 1.5rem;text-align:center;border-bottom:3px solid var(--primary)}
header h1{font-size:1.8rem;font-weight:800;margin-bottom:0.3rem}
header h1 span{color:var(--gold)}
header p{color:#a5b4fc;font-size:0.9rem;max-width:600px;margin:0 auto 1rem}
.badges{display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap}
.badge{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);padding:0.3rem 0.8rem;border-radius:50px;font-size:0.75rem;color:#a5b4fc}
header .cta{background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;padding:0.6rem 1.5rem;border-radius:8px;font-weight:700;display:inline-block;margin-top:0.5rem;font-size:0.9rem}

/* CONTAINER */
.container{max-width:1100px;margin:0 auto;padding:1.5rem}

/* SEARCH */
.search-box{position:relative;margin-bottom:1.5rem}
.search-box input{width:100%;padding:1rem 3.5rem 1rem 1.2rem;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1rem;transition:border 0.2s}
.search-box input:focus{outline:none;border-color:var(--primary)}
.search-box .search-icon{position:absolute;right:1rem;top:50%;transform:translateY(-50%);font-size:1.2rem;opacity:0.5}
.search-suggestions{display:none;position:absolute;top:calc(100%+4px);left:0;right:0;background:var(--card2);border:1px solid var(--border);border-radius:12px;z-index:100;overflow:hidden}
.search-suggestions.show{display:block}
.search-suggestions .sug-item{padding:0.7rem 1.2rem;cursor:pointer;font-size:0.9rem;transition:background 0.15s}
.search-suggestions .sug-item:hover{background:var(--primary);color:#fff}

/* TABS */
.tabs{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:1.2rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.tab{padding:0.45rem 0.9rem;border-radius:8px;cursor:pointer;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:0.82rem;transition:all 0.15s}
.tab:hover{border-color:var(--primary);color:var(--text)}
.tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
.tab .count{background:rgba(255,255,255,0.2);padding:0.1rem 0.4rem;border-radius:10px;font-size:0.7rem;margin-left:0.3rem}

/* TOOL GRID */
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.8rem;margin-bottom:1.5rem}
.tool{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.tool:hover{transform:translateY(-2px);border-color:var(--primary2);box-shadow:0 8px 24px rgba(99,102,241,0.15)}
.tool .icon{font-size:1.6rem;margin-bottom:0.4rem}
.tool .name{font-weight:600;font-size:0.88rem;margin-bottom:0.2rem}
.tool .desc{color:var(--muted);font-size:0.75rem;line-height:1.4}
.tool .hot{position:absolute;top:6px;right:6px;font-size:0.65rem;background:var(--danger);color:#fff;padding:1px 5px;border-radius:4px}

/* PANEL */
.panel{display:none}
.panel.active{display:block}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding:1rem;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.panel-header h2{font-size:1rem;font-weight:700}
.panel-header h2 .icon{margin-right:0.3rem}
.back-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:0.4rem 0.8rem;border-radius:6px;cursor:pointer;font-size:0.82rem}
.back-btn:hover{border-color:var(--primary)}
.content-area{}

/* FORM ELEMENTS */
textarea,input[type=text],input[type=number],select{width:100%;padding:0.75rem;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.9rem;font-family:inherit;margin-bottom:0.7rem;transition:border 0.2s}
textarea:focus,input:focus,select:focus{outline:none;border-color:var(--primary)}
label{font-size:0.8rem;color:var(--muted);margin-bottom:0.3rem;display:block}
textarea{min-height:120px;resize:vertical}

/* BUTTONS */
.btn{padding:0.55rem 1.2rem;border-radius:8px;border:none;cursor:pointer;font-size:0.85rem;font-weight:600;transition:all 0.15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary2)}
.btn-warn{background:var(--warning);color:#000}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary)}
.btn-group{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.7rem}
.btn-sm{padding:0.35rem 0.8rem;font-size:0.78rem}

/* RESULT */
.result-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0.8rem;min-height:60px;white-space:pre-wrap;word-break:break-all;font-size:0.88rem;max-height:400px;overflow-y:auto;margin-top:0.5rem;line-height:1.7}
.result-box.success{border-color:var(--success)}
.result-box.error{border-color:var(--danger)}
.copy-btn{float:right;font-size:0.72rem;padding:0.2rem 0.5rem;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:4px;cursor:pointer}
.copy-btn:hover{color:var(--text);border-color:var(--primary)}

/* FILE DROP */
.file-drop{border:2px dashed var(--border);border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;transition:all 0.15s;margin-bottom:0.7rem;font-size:0.85rem;color:var(--muted)}
.file-drop:hover,.file-drop.dragover{border-color:var(--primary);background:rgba(99,102,241,0.05)}
.file-drop input{display:none}

/* SECTION DIVIDER */
.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:var(--muted);font-size:0.8rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--success);color:#fff;padding:0.7rem 1.2rem;border-radius:8px;font-size:0.85rem;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.toast.error{background:var(--danger)}

/* STATS BAR */
.stats-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.8rem 1rem;display:flex;gap:1.5rem;margin-bottom:1.5rem;font-size:0.82rem;color:var(--muted);flex-wrap:wrap}
.stats-bar .stat span{color:var(--primary2);font-weight:700}

/* FOOTER */
footer{text-align:center;padding:2rem 1rem;border-top:1px solid var(--border);color:var(--muted);font-size:0.8rem}
footer a{color:var(--primary2)}

/* RESPONSIVE */
@media(max-width:600px){.tool-grid{grid-template-columns:repeat(2,1fr)};header h1{font-size:1.4rem}}
</style>
</head>
<body>

<header>
  <h1>🛠️ 效率百科 <span>Tools</span></h1>
  <p>40+ 免费在线工具 · 无需注册 · 纯前端处理 · 保护隐私</p>
  <div class="badges">
    <span class="badge">🔥 永久免费</span>
    <span class="badge">⚡ 即开即用</span>
    <span class="badge">🔒 隐私安全</span>
    <span class="badge">📱 手机可用</span>
  </div>
  <div style="margin-top:1rem">

</header>

<div class="container">
  <div class="stats-bar">
    <div class="stat">🛠️ 工具总数：<span id="totalTools">40+</span></div>
    <div class="stat">👆 使用次数：<span>100,000+</span></div>

</div>

<div class="toast" id="toast"></div>


<!-- 打赏支持 -->
<div id="support-section" style="background:linear-gradient(135deg,#1a1a2e,#16213e);margin:2rem 0;padding:2rem 1.5rem;border-radius:16px;border:1px solid #f59e0b;text-align:center">
  <h3 style="color:#fbbf24;margin-bottom:0.8rem">☕ 觉得好用？请我喝杯咖啡</h3>
  <p style="color:#94a3b8;font-size:0.85rem;margin-bottom:1rem">所有工具永久免费 · 你的支持是我更新的动力</p>
  <img src="wechat-pay.png" style="width:180px;border-radius:12px;border:2px solid #fbbf24" alt="微信扫码打赏">
</div>

<footer>
  <p>Made with ❤️ · <a href="https://github.com/050612s/efficiency-toolkit">GitHub</a> · MIT License</p>
</footer>

<script>
// ========== 工具数据 ==========
const CATEGORIES = [

    tools:[
      {id:"text_dedup",icon:"🔁",name:"文本去重",desc:"去除重复行/段落",hot:true},
      {id:"text_diff",icon:"📊",name:"文本对比",desc:"高亮显示两段文本差异"},
      {id:"text_counter",icon:"📏",name:"字数统计",desc:"中英文字数/行数/段落"},
      {id:"text_wordfreq",icon:"📈",name:"词频统计",desc:"词频分析/关键词提取"},
      {id:"text_keyword",icon:"🔑",name:"关键词提取",desc:"自动提取文本关键词"},
      {id:"text_slug",icon:"🔗",name:"Slug生成",desc:"中文转URL友好字符串"},
      {id:"text_pinyin",icon:"🅰️",name:"汉字转拼音",desc:"汉字转全拼/首字母"},

      {id:"text_case",icon:"Aa",name:"大小写转换",desc:"全大写/小写/首字母大写"},
      {id:"text_join",icon:"🔗",name:"行拼接",desc:"多行合并/指定分隔符"},
    ]
  },
  {
    name:"🖼️ 图片工具", color:"#ec4899",
    tools:[
      {id:"img_base64",icon:"🖼️",name:"图片↔Base64",desc:"图片与Base64互转"},
      {id:"img_compress",icon:"📦",name:"图片压缩",desc:"JPG/PNG/WebP压缩",hot:true},
      {id:"img_png2jpg",icon:"🔄",name:"PNG转JPG",desc:"PNG图片转为JPG格式"},
      {id:"img_resize",icon:"📐",name:"图片缩放",desc:"调整图片尺寸分辨率"},
      {id:"img_crop",icon:"✂️",name:"图片裁剪",desc:"指定区域裁剪图片"},
      {id:"img_ico",icon:"🏁",name:"图片转ICO",desc:"生成网站图标.ico"},
    ]
  },
  {
    name:"📄 PDF工具", color:"#f59e0b",
    tools:[
      {id:"pdf_preview",icon:"👁️",name:"PDF预览",desc:"在线预览PDF内容"},
      {id:"pdf_merge",icon:"📚",name:"PDF合并",desc:"合并多个PDF文件"},
      {id:"pdf_split",icon:"✂️",name:"PDF拆分",desc:"按页数拆分PDF文件"},
      {id:"pdf_text",icon:"📝",name:"PDF转文本",desc:"提取PDF中的文字内容"},
      {id:"pdf_pagecount",icon:"🔢",name:"PDF页数",desc:"查看PDF总页数"},
    ]
  },
  {
    name:"🔄 格式转换", color:"#10b981",
    tools:[
      {id:"fmt_json",icon:"{ }",name:"JSON格式化",desc:"JSON美化/压缩/校验",hot:true},
      {id:"fmt_xml",icon:"📄",name:"XML格式化",desc:"XML美化/压缩"},
      {id:"fmt_timestamp",icon:"🕐",name:"时间戳转换",desc:"时间戳与日期互转"},
      {id:"fmt_color",icon:"🎨",name:"颜色转换",desc:"HEX/RGB/HSL互转"},
      {id:"fmt_unit",icon:"📐",name:"单位换算",desc:"长度/重量/温度/面积"},
      {id:"fmt_url",icon:"🔗",name:"URL编码",desc:"URL编码/解码"},
      {id:"fmt_html",icon:"🏷️",name:"HTML实体",desc:"HTML实体编解码"},
      {id:"fmt_base64",icon:"📝",name:"Base64文本",desc:"文本Base64编码/解码"},
    ]
  },
  {
    name:"🎵 媒体工具", color:"#8b5cf6",
    tools:[
      {id:"media_qr",icon:"📱",name:"二维码生成",desc:"文本/链接生成二维码",hot:true},
      {id:"media_qr_decode",icon:"📷",name:"二维码解码",desc:"识别图片中的二维码"},
      {id:"media_barcode",icon:"📊",name:"条形码",desc:"生成各种条形码"},
      {id:"media_gif",icon:"🎬",name:"视频转GIF",desc:"视频片段截取转GIF"},
    ]
  },
  {
    name:"🛡️ 安全工具", color:"#ef4444",
    tools:[
      {id:"sec_hash",icon:"#",name:"哈希计算",desc:"MD5/SHA-1/SHA-256"},
      {id:"sec_hashverify",icon:"✅",name:"哈希校验",desc:"验证文件完整性"},
      {id:"sec_jwt",icon:"🔓",name:"JWT解析",desc:"解码JWT Token"},
      {id:"sec_password",icon:"🔐",name:"密码生成",desc:"生成随机强密码"},
      {id:"sec_uuid",icon:"🆔",name:"UUID生成",desc:"批量生成UUID"},
    ]
  },
  {
    name:"📋 开发者", color:"#06b6d4",
    tools:[
      {id:"dev_regex",icon:"🔍",name:"正则测试",desc:"正则表达式实时测试",hot:true},
      {id:"dev_cron",icon:"⏰",name:"Cron生成",desc:"Cron表达式生成与解析"},
      {id:"dev_markdown",icon:"📝",name:"Markdown预览",desc:"实时预览Markdown效果"},
      {id:"dev_color",icon:"🎨",name:"颜色格式",desc:"各颜色格式互转"},
      {id:"dev_table2csv",icon:"📄",name:"表格转CSV",desc:"粘贴表格数据转CSV"},
      {id:"dev_random",icon:"🎲",name:"随机数据",desc:"随机数/随机抽样/抽奖"},
    ]
  },
  {
    name:"⏱️ 实用工具", color:"#f97316",
    tools:[
      {id:"util_timer",icon:"⏱️",name:"计时器",desc:"秒表/倒计时/Pomodoro",hot:true},
      {id:"util_table",icon:"📊",name:"简易表格",desc:"在线创建简易数据表格"},
      {id:"util_listrand",icon:"🎯",name:"随机抽签",desc:"从列表中随机抽取"},
      {id:"util_colorpal",icon:"🎨",name:"调色板",desc:"在线调色板配色方案"},
    ]
  }
];

// ========== 全局状态 ==========
let currentCat = null;
let currentTool = null;

// ========== 工具函数 ==========
function toast(msg, isError=false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (isError ? " error" : "");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2000);
}

function copy(text) {
  navigator.clipboard.writeText(text).then(()=>toast("✅ 已复制到剪贴板"));
}

// ========== 搜索 ==========
const allTools = CATEGORIES.flatMap(c=>c.tools);
const searchInput = document.getElementById("searchInput");
const sugEl = document.getElementById("searchSug");

searchInput.addEventListener("input", e => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) { sugEl.classList.remove("show"); return; }
  const matches = allTools.filter(t => t.name.includes(q) || t.desc.includes(q) || t.id.includes(q)).slice(0,8);
  if (!matches.length) { sugEl.classList.remove("show"); return; }
  sugEl.innerHTML = matches.map(t => `<div class="sug-item" onclick="openTool('${t.id}')">${t.icon} ${t.name} — ${t.desc}</div>`).join("");
  sugEl.classList.add("show");
});

searchInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && sugEl.classList.contains("show")) {
    const first = sugEl.querySelector(".sug-item");
    if (first) { first.click(); sugEl.classList.remove("show"); }
  }
});

document.addEventListener("click", e => {
  if (!e.target.closest(".search-box")) sugEl.classList.remove("show");
});

// ========== 渲染分类 ==========
function renderCats() {
  const tabsEl = document.getElementById("tabs");
  const panelsEl = document.getElementById("panels");
  tabsEl.innerHTML = "";
  panelsEl.innerHTML = "";

  CATEGORIES.forEach((cat, ci) => {
    tabsEl.innerHTML += `<button class="tab${ci===0?' active':''}" onclick="switchCat(${ci})">${cat.name} <span class="count">${cat.tools.length}</span></button>`;
    
    const panel = document.createElement("div");
    panel.className = "panel" + (ci===0?" active":"");
    panel.id = "panel-" + ci;
    
    let grid = '<div class="tool-grid">';
    cat.tools.forEach(t => {
      grid += `<div class="tool" onclick="openTool('${t.id}')">
        ${t.hot?'<span class="hot">HOT</span>':''}
        <div class="icon">${t.icon}</div>
        <div class="name">${t.name}</div>
        <div class="desc">${t.desc}</div>
      </div>`;
    });
    grid += '</div>';
    panel.innerHTML = grid;
    panelsEl.appendChild(panel);
  });
}

function switchCat(idx) {
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",i===idx));
  document.querySelectorAll(".panel").forEach((p,i)=>p.classList.toggle("active",i===idx));
}

// ========== 打开工具 ==========
function openTool(id) {
  // 找到工具所属分类并切换
  CATEGORIES.forEach((cat,ci)=>{
    if(cat.tools.find(t=>t.id===id)) switchCat(ci);
  });
  
  currentTool = allTools.find(t=>t.id===id);
  const panel = document.querySelector(".panel.active");
  panel.innerHTML = `<div class="panel-header">
    <h2>${currentTool.icon} ${currentTool.name}</h2>
    <button class="back-btn" onclick="renderCats()">← 工具列表</button>
  </div>
  <div class="content-area" id="toolContent"></div>`;
  
  renderToolUI(id);
}

function renderToolUI(id) {
  const el = document.getElementById("toolContent");
  if (!el) return;
  const cfg = TOOLS[id]();
  el.innerHTML = (cfg.inputs||'') + (cfg.init||'');
  el.innerHTML += `<div class="result-box" data-result="true" style="display:none"></div>`;
}

// ========== 工具函数映射 ==========
const TOOLS = {};

// ---- 文本去重 ----
TOOLS.text_dedup = () => ({
  inputs: `<textarea id="td_in" placeholder="每行一个内容，重复行会被去除"></textarea>
<div class="btn-group"><button class="btn btn-primary" onclick="runT('text_dedup')">去重</button></div>`
});
TOOL_FNS.text_dedup = () => {
  const lines = document.getElementById("td_in").value.split("\n");
  const seen=new Set(), out=[];
  for(const l of lines) if(l.trim()&&!seen.has(l)){seen.add(l);out.push(l);}
  showResult(out.join("\n"));
};

// ---- 文本对比 ----
TOOLS.text_diff = () => ({
  inputs: `<label>原文</label><textarea id="tdf_a" rows="5" placeholder="原文..."></textarea>
<label>修改后</label><textarea id="tdf_b" rows="5" placeholder="修改后..."></textarea>
<div class="btn-group"><button class="btn btn-primary" onclick="runT('text_diff')">对比</button></div>`
});
TOOL_FNS.text_diff = () => {
  const a = document.getElementById("tdf_a").value.split("\n");
  const b = document.getElementById("tdf_b").value.split("\n");
  let html = '<div style="font-size:0.85rem;line-height:1.8">';
  const max = Math.max(a.length,b.length);
  for(let i=0;i<max;i++){
    const av=a[i]||'',bv=b[i]||'';
    if(av===bv&&!av)continue;
    if(av) html+='<div style="color:#f87171;background:rgba(248,113,113,0.1);padding:1px 4px">- '+av+'</div>';
    if(bv) html+='<div style="color:#34d399;background:rgba(52,211,153,0.1);padding:1px 4px">+ '+bv+'</div>';
    if(av===bv) html+='<div style="color:var(--muted)">  '+av+'</div>';
  }
  html += '</div>';
  showResultHTML(html);
};

// ---- 字数统计 ----
TOOLS.text_counter = () => ({
  inputs: `<textarea id="tc_in" placeholder="输入要统计的文本..." rows="6"></textarea>
<div class="btn-group">

  inputs: `<textarea id="fx_in" placeholder="<root><item>测试</item></root>" rows="6"></textarea>

TOOL_FNS.fmt_xml_fmt = () => {
  const t=document.getElementById("fx_in").value;
  let formatted="",indent=0;
  t.replace(/>\s*</g,"><").split(/(<[^>]+>)/g).forEach(part=>{
    if(!part.trim())return;
    if(part.match(/^<\/\w/))indent=Math.max(0,indent-2);
    formatted+=part.replace(/^/," ".repeat(indent));

TOOL_FNS.fmt_color = () => {
  let hex=document.getElementById("fc_hex").value.trim();
  if(!hex.startsWith("#"))hex="#"+hex;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const r2=g2=b2=0,d=0;
  const r_n=r/255,g_n=g/255,b_n=b/255;
  const max=Math.max(r_n,g_n,b_n),min=Math.min(r_n,g_n,b_n);
  let h=0,s=0,l=(max+min)/2;
  if(max!==min){
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r_n:h=((g_n-b_n)/d+(g_n<b_n?6:0))/6;break;
      case g_n:h=((b_n-r_n)/d+2)/6;break;
      case b_n:h=((r_n-g_n)/d+4)/6;break;
    }
  }
  const hsl_h=Math.round(h*360),hsl_s=Math.round(s*100),hsl_l=Math.round(l*100);
  document.getElementById("fc_result").innerHTML=`<div style="display:flex;align-items:center;gap:1rem;padding:0.5rem">
<div style="width:60px;height:60px;background:${hex};border-radius:10px;border:1px solid var(--border)"></div>
<div><div style="margin:2px 0"><b>HEX</b>: <span style="font-family:monospace">${hex}</span> <button class="copy-btn" onclick="copy('${hex}')">复制</button></div>
<div style="margin:2px 0"><b>RGB</b>: rgb(${r},${g},${b}) <button class="copy-btn" onclick="copy('rgb(${r},${g},${b})')">复制</button></div>
<div style="margin:2px 0"><b>HSL</b>: hsl(${hsl_h},${hsl_s}%,${hsl_l}%) <button class="copy-btn" onclick="copy('hsl(${hsl_h},${hsl_s}%,${hsl_l}%)')">复制</button></div>
</div></div>`;
  document.getElementById("fc_result").style.display="block";
};

TOOL_FNS.fmt_unit = () => {
  const v=parseFloat(document.getElementById("fu_val").value);
  const from=document.getElementById("fu_from").value;
  const to=document.getElementById("fu_to").value;
  if(isNaN(v)){toast("请输入数值",true);return;}
  const m={m:1,km:1000,cm:0.01,mm:0.001,kg:1,g:0.001};
  const conversions={
    m_km:v/1000,m_m:v,m_cm:v/0.01,m_mm:v/0.001,
    km_m:v*1000,km_km:v,km_cm:v*100000,km_mm:v*1000000,
    cm_m:v*0.01,cm_km:v*0.00001,cm_cm:v,cm_mm:v*0.1,
    mm_m:v*0.001,mm_km:v*0.000001,mm_cm:v*10,mm_mm:v,
  };
  if(from==="c"){
    const r=to==="f"?v*9/5+32:v;
    showResult(`${v}℃ = ${r.toFixed(4)}${to==="f"?"℉":"℃"}`);
  } else if(from==="f"){
    const r=to==="c"?(v-32)*5/9:v;
    showResult(`${v}℉ = ${r.toFixed(4)}${to==="c"?"℃":"℉"}`);
  } else if(["m","km","cm","mm"].includes(from)&&["m","km","cm","mm"].includes(to)){
    const r=v*m[from]/m[to];
    showResult(`${v}${from} = ${r.toFixed(6)}${to}`);
  } else if(["kg","g"].includes(from)&&["kg","g"].includes(to)){
    const r=v*m[from]/m[to];
    showResult(`${v}${from} = ${r.toFixed(6)}${to}`);
  } else {
    showResult("不支持的单位转换",true);
  }
};

TOOLS.dev_markdown = () => ({
  inputs: `<textarea id="dm_in" placeholder="# 标题\n\n**粗体** 和 *斜体*\n\n- 列表项1\n- 列表项2\n\n```code```" rows="8"></textarea>
<div class="btn-group"><button class="btn btn-primary" onclick="runT('dev_markdown')">预览</button></div>
<div id="dm_result" style="display:none;padding:1rem;background:var(--card);border-radius:8px;min-height:100px;line-height:1.8"></div>`
});
TOOL_FNS.dev_markdown = () => {
  const t=document.getElementById("dm_in").value;
  let html=t
    .replace(/^### (.+)$/gm,"<h3>$1</h3>")
    .replace(/^## (.+)$/gm,"<h2>$1</h2>")
    .replace(/^# (.+)$/gm,"<h1>$1</h1>")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    .replace(/`([^`]+)`/g,"<code style='background:var(--bg);padding:2px 6px;border-radius:4px;font-size:0.88em'>$1</code>")
    .replace(/```[\s\S]*?```/g,m=>"<pre><code>"+m.replace(/```/g,'')+"</code></pre>")
    .replace(/^- (.+)$/gm,"<li>$1</li>")
    .replace(/(<li>.*<\/li>)/s,"<ul>$1</ul>")
    .replace(/\n\n/g,"<br><br>")
    .replace(/\n/g,"<br>");
  document.getElementById("dm_result").innerHTML=html;
  document.getElementById("dm_result").style.display="block";
};

TOOLS.util_timer = () => ({
  inputs: `<div style="text-align:center;padding:1.5rem">
<div id="timer_disp" style="font-size:3.5rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:2px">00:00</div>
<div style="font-size:1rem;color:var(--muted);margin:0.5rem 0" id="timer_mode">秒表</div>
<div class="btn-group" style="justify-content:center">
<button class="btn btn-primary btn-sm" onclick="runT('timer_toggle')" id="timer_toggle_btn">▶ 开始</button>
<button class="btn btn-outline btn-sm" onclick="runT('timer_reset')">重置</button>
</div>
<div style="margin-top:1rem">
<label>倒计时（分钟）</label>
<div style="display:flex;gap:0.5rem;align-items:center">
<input type="number" id="timer_set" value="25" min="1" style="width:80px;text-align:center;margin:0">
<button class="btn btn-warn btn-sm" onclick="runT('timer_countdown')">开始倒计时</button>
</div>
</div>
</div>`
});
window._timerState={running:false,seconds:0,interval:null,mode:"stopwatch"};
TOOL_FNS.timer_toggle = () => {
  const st=window._timerState;
  const disp=document.getElementById("timer_disp");
  const btn=document.getElementById("timer_toggle_btn");
  const mode=document.getElementById("timer_mode");
  if(!st.running){
    st.running=true;
    btn.textContent="⏸ 暂停";
    mode.textContent="秒表";
    st.interval=setInterval(()=>{
      st.seconds++;
      const m=String(Math.floor(st.seconds/60)).padStart(2,"0");
      const s=String(st.seconds%60).padStart(2,"0");
      disp.textContent=m+":"+s;
    },1000);
  } else {
    st.running=false;
    btn.textContent="▶ 继续";
    clearInterval(st.interval);
  }
};
TOOL_FNS.timer_reset = () => {
  window._timerState={running:false,seconds:0,interval:null,mode:"stopwatch"};
  clearInterval(window._timerState.interval);
  document.getElementById("timer_disp").textContent="00:00";
  document.getElementById("timer_toggle_btn").textContent="▶ 开始";
  document.getElementById("timer_mode").textContent="秒表";
};
TOOL_FNS.timer_countdown = () => {
  const mins=parseInt(document.getElementById("timer_set").value)||1;
  clearInterval(window._timerState.interval);
  let secs=mins*60;
  window._timerState.running=true;
  const disp=document.getElementById("timer_disp");
  const mode=document.getElementById("timer_mode");
  mode.textContent="倒计时 "+mins+" 分钟";
  window._timerState.interval=setInterval(()=>{
    secs--;
    if(secs<=0){clearInterval(window._timerState.interval);disp.textContent="⏰ 时间到！";toast("⏰ 倒计时结束！");return;}
    const m=String(Math.floor(secs/60)).padStart(2,"0");
    const s=String(secs%60).padStart(2,"0");
    disp.textContent=m+":"+s;
  },1000);
};

// ========== 全局 runT ==========
function runT(id) {
  TOOL_FNS._lastId=id;
  const fn=TOOL_FNS[id];
  if(fn) fn();
}

function showResult(text, isError=false) {
  const el=document.querySelector(".panel.active .result-box[data-result]");
  if(!el) return;
  el.style.display="block";
  el.className="result-box"+(isError?" error":" success");
  el.innerHTML=`<button class="copy-btn" onclick="copy(this.parentElement.innerText.replace('复制','').trim())">复制</button>`+text;
}

function showResultHTML(html) {
  const el=document.querySelector(".panel.active .result-box[data-result]");
  if(!el) return;
  el.style.display="block";
  el.className="result-box success";
  el.innerHTML=html;
}
